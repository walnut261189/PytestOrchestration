# ─────────────────────────────────────────────────────────────────
# docker/mosquitto/mosquitto.conf
# Mosquitto config for the test environment.
# Mount this into the eclipse-mosquitto container at:
#   /mosquitto/config/mosquitto.conf
# ─────────────────────────────────────────────────────────────────

# Plain MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (useful for browser-based test tooling)
listener 9001
protocol websockets

# Allow anonymous connections in test environment.
# For auth testing, flip to false and add a password_file.
allow_anonymous true

# Persistence — keeps retained messages across restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Connection limits
max_connections 200
max_inflight_messages 100
max_queued_messages 1000

# Keep-alive (seconds)
keepalive_interval 60
