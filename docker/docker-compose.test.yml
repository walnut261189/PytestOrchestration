# ─────────────────────────────────────────────────────────────────
# docker/docker-compose.test.yml
#
# Three separate adapter containers, each with its own embedded
# Mosquitto broker on a unique port.
#
# Startup order:
#   cratedb → processor → proxy → router
#          → adapter-voltage (port 1884)
#          → adapter-current (port 1885)
#          → adapter-temperature (port 1886)
#          → landing
#
# Adding a new adapter type:
#   1. Add a service block below following the same pattern
#   2. Use the next available port (1887, 9005, 5004 etc.)
#   3. Add its env vars to .env.example and env_config.py
# ─────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  pipeline-net:
    driver: bridge

volumes:
  cratedb-data:

services:

  # ── CrateDB (on-prem DB) ──────────────────────────────────────────
  cratedb:
    image: crate:latest
    container_name: test-cratedb
    ports:
      - "4200:4200"
      - "5432:5432"
    environment:
      - CRATE_HEAP_SIZE=512m
    volumes:
      - cratedb-data:/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Streamlit Processor ───────────────────────────────────────────
  # PROCESSOR_TARGET controls where data is routed:
  #   onprem → CrateDB   |   cloud → cloud DB
  processor:
    image: ${PROCESSOR_IMAGE:-your-registry/iot-processor:latest}
    container_name: test-processor
    ports:
      - "8501:8501"
    environment:
      - ENV=onprem
      - PROCESSOR_TARGET=${PROCESSOR_TARGET:-onprem}
      - CRATEDB_HOST=cratedb
      - CRATEDB_PORT=5432
      - CRATEDB_HTTP_PORT=4200
      - CLOUD_DB_HOST=${CLOUD_DB_HOST:-}
      - CLOUD_DB_PORT=${CLOUD_DB_PORT:-1433}
      - CLOUD_DB_NAME=${CLOUD_DB_NAME:-iot_pipeline}
      - CLOUD_DB_USER=${CLOUD_DB_USER:-}
      - CLOUD_DB_PASSWORD=${CLOUD_DB_PASSWORD:-}
    networks:
      - pipeline-net
    depends_on:
      cratedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Proxy ─────────────────────────────────────────────────────────
  proxy:
    image: ${PROXY_IMAGE:-your-registry/iot-proxy:latest}
    container_name: test-proxy
    ports:
      - "7000:7000"
    environment:
      - PROCESSOR_HOST=processor
      - PROCESSOR_PORT=8501
    networks:
      - pipeline-net
    depends_on:
      processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Router ────────────────────────────────────────────────────────
  router:
    image: ${ROUTER_IMAGE:-your-registry/iot-router:latest}
    container_name: test-router
    ports:
      - "6000:6000"
    environment:
      - PROXY_HOST=proxy
      - PROXY_PORT=7000
    networks:
      - pipeline-net
    depends_on:
      proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Voltage Adapter (embeds Mosquitto on port 1884) ───────────────
  adapter-voltage:
    image: ${ADAPTER_VOLTAGE_IMAGE:-your-registry/iot-adapter-voltage:latest}
    container_name: test-adapter-voltage
    ports:
      - "5001:5001"    # HTTP management API
      - "1884:1883"    # Mosquitto MQTT (mapped to unique host port)
      - "9002:9001"    # Mosquitto WebSocket
    environment:
      - ADAPTER_TYPE=voltage
      - MQTT_TOPIC_PREFIX=devices
      - MQTT_QOS=1
      - ROUTER_HOST=router
      - ROUTER_PORT=6000
    networks:
      - pipeline-net
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Current Adapter (embeds Mosquitto on port 1885) ───────────────
  adapter-current:
    image: ${ADAPTER_CURRENT_IMAGE:-your-registry/iot-adapter-current:latest}
    container_name: test-adapter-current
    ports:
      - "5002:5001"
      - "1885:1883"
      - "9003:9001"
    environment:
      - ADAPTER_TYPE=current
      - MQTT_TOPIC_PREFIX=devices
      - MQTT_QOS=1
      - ROUTER_HOST=router
      - ROUTER_PORT=6000
    networks:
      - pipeline-net
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Temperature Adapter (embeds Mosquitto on port 1886) ───────────
  adapter-temperature:
    image: ${ADAPTER_TEMPERATURE_IMAGE:-your-registry/iot-adapter-temperature:latest}
    container_name: test-adapter-temperature
    ports:
      - "5003:5001"
      - "1886:1883"
      - "9004:9001"
    environment:
      - ADAPTER_TYPE=temperature
      - MQTT_TOPIC_PREFIX=devices
      - MQTT_QOS=1
      - ROUTER_HOST=router
      - ROUTER_PORT=6000
    networks:
      - pipeline-net
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Landing Page ──────────────────────────────────────────────────
  landing:
    image: ${LANDING_IMAGE:-your-registry/iot-landing:latest}
    container_name: test-landing
    ports:
      - "3000:3000"
    environment:
      - PROCESSOR_HOST=processor
      - CRATEDB_HOST=cratedb
    networks:
      - pipeline-net
    depends_on:
      processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
