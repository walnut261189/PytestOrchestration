[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit:             Fast, isolated unit tests (no Docker required)
    integration:      Cross-component tests (Docker containers must be up)
    e2e:              Full pipeline end-to-end tests
    smoke:            Quick sanity checks post-deployment

    # ── Component markers ──────────────────────────────────────────
    mqtt:             Mosquitto broker tests (per-adapter broker)
    adapter:          Any adapter test (use with type marker to narrow)
    router:           Router component tests
    proxy:            Proxy server tests
    processor:        Streamlit processor tests
    db:               CrateDB tests
    landing:          Landing page tests

    # ── Adapter type markers ───────────────────────────────────────
    voltage:          Voltage adapter tests
    current:          Current adapter tests
    temperature:      Temperature adapter tests

    # ── Processor routing markers (auto-skip if wrong target) ──────
    processor_onprem: Tests that assert data lands in CrateDB (PROCESSOR_TARGET=onprem)
    processor_cloud:  Tests that assert data lands in cloud DB (PROCESSOR_TARGET=cloud)

    # ── Environment markers ────────────────────────────────────────
    onprem:           Tests valid for on-prem environment only
    cloud:            Tests valid for Azure cloud environment only

addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=reports/junit.xml
    --html=reports/report.html
    --self-contained-html

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

timeout = 60
