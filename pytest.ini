[pytest]
# ─────────────────────────────────────────────
# IoT Pipeline – Pytest master configuration
# ─────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers – used to selectively run test layers
markers =
    unit:        Fast, isolated unit tests (no Docker required)
    integration: Cross-component tests (Docker containers must be up)
    e2e:         Full pipeline end-to-end tests
    adapter:     Adapter component tests
    router:      Router component tests
    proxy:       Proxy server tests
    processor:   Streamlit processor tests
    db:          CrateDB tests
    landing:     Landing page tests
    smoke:       Quick sanity checks post-deployment
    onprem:      Tests valid for on-prem environment only
    cloud:       Tests valid for Azure cloud environment only

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=reports/junit.xml
    --html=reports/report.html
    --self-contained-html

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Timeout (seconds) per test – override per-test with @pytest.mark.timeout(N)
timeout = 60
